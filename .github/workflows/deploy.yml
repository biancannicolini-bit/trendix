name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.vars.outputs.owner }}
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/trendix-app:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/trendix-app:latest

      - name: Build and push python
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/trendix-python:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/trendix-python:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Update Swarm services on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            OWNER="${{ needs.build-and-push.outputs.owner }}"
            TAG="${{ needs.build-and-push.outputs.tag }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker service update --image "ghcr.io/${OWNER}/trendix-app:${TAG}" trendix_app
            docker service update --image "ghcr.io/${OWNER}/trendix-python:${TAG}" trendix_python
